<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ECRM V1.7 混合模式草图 - 桌面版</title>
    <link rel="stylesheet" href="./hybrid-real-shell.css" />
  </head>
  <body class="hybridPrototype desktopShell" data-platform="desktop">
    <div class="appShell">
      <aside class="sideRail" aria-label="主导航">
        <div class="brandBlock">
          <div class="brandMark" aria-hidden="true">E</div>
        </div>
        <nav class="mainNav" aria-label="页面导航">
          <button type="button" data-page="mode"><span class="navIcon navIconLock" aria-hidden="true"></span><em>模式</em></button>
          <button type="button" class="isActive" data-page="products"><span class="navIcon navIconBox" aria-hidden="true"></span><em>商品</em></button>
          <button type="button" data-page="sales"><span class="navIcon navIconCart" aria-hidden="true"></span><em>售卖</em></button>
          <button type="button" data-page="orders"><span class="navIcon navIconOrder" aria-hidden="true"></span><em>订单</em></button>
          <button type="button" data-page="dashboard"><span class="navIcon navIconChart" aria-hidden="true"></span><em>数据</em></button>
          <button type="button" data-page="settings"><span class="navIcon navIconGear" aria-hidden="true"></span><em>设置</em></button>
        </nav>
        <div class="railFutureSlot" aria-hidden="true"><span>—</span><span>—</span></div>
      </aside>

      <main class="workbench">
        <section class="pageView" data-view="mode" aria-labelledby="mode-title"></section>
        <section class="pageView isActive" data-view="products" aria-labelledby="products-title"></section>
        <section class="pageView" data-view="sales" aria-labelledby="sales-title"></section>
        <section class="pageView" data-view="orders" aria-labelledby="orders-title"></section>
        <section class="pageView" data-view="dashboard" aria-labelledby="dashboard-title"></section>
        <section class="pageView" data-view="settings" aria-labelledby="settings-title"></section>
      </main>
    </div>

    <div class="modalHost" data-modal-host></div>
    <script src="./hybrid-real-shell.js"></script>
  </body>
</html>
