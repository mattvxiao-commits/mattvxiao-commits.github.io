<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ECRM V1.7 混合模式草图 - 桌面版</title>
    <link rel="stylesheet" href="./hybrid-real-shell.css" />
  </head>
  <body class="hybridPrototype desktopShell" data-platform="desktop">
    <div class="appShell">
      <aside class="sideRail" aria-label="主导航">
        <div class="brandBlock">
          <div class="brandMark" aria-hidden="true">E</div>
          <div>
            <div class="brandLine">
              <strong>ECRM</strong>
              <span>v1.7</span>
            </div>
            <p data-shop-name>轻量现场经营工具</p>
          </div>
        </div>
        <button type="button" class="railCollapseButton" data-collapse-rail aria-label="收起或展开左侧导航">收起菜单</button>
        <nav class="mainNav" aria-label="页面导航">
          <button type="button" class="isActive" data-page="products"><span aria-hidden="true">▧</span><em>商品</em></button>
          <button type="button" data-page="sales"><span aria-hidden="true">◇</span><em>售卖</em></button>
          <button type="button" data-page="orders"><span aria-hidden="true">▤</span><em>订单</em></button>
          <button type="button" data-page="dashboard"><span aria-hidden="true">▣</span><em>仪表盘</em></button>
          <button type="button" data-page="settings"><span aria-hidden="true">○</span><em>设置</em></button>
        </nav>
        <div class="railStatus">
          <span>现场模式</span>
          <strong>已锁定</strong>
        </div>
      </aside>

      <main class="workbench">
        <section class="pageView isActive" data-view="products" aria-labelledby="products-title"></section>
        <section class="pageView" data-view="sales" aria-labelledby="sales-title"></section>
        <section class="pageView" data-view="orders" aria-labelledby="orders-title"></section>
        <section class="pageView" data-view="dashboard" aria-labelledby="dashboard-title"></section>
        <section class="pageView" data-view="settings" aria-labelledby="settings-title"></section>
      </main>
    </div>

    <script src="./hybrid-real-shell.js"></script>
  </body>
</html>
