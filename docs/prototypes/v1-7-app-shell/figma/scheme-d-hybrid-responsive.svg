<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="820" fill="#F7F4EE"/>
  <text x="56" y="58" fill="#194A3F" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" font-weight="800">Scheme D</text>
  <text x="56" y="92" fill="#241F1A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="30" font-weight="800">混合响应式示意：桌面左侧导航 + 小屏底部导航</text>
  <text x="56" y="122" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">默认桌面 / Windows 浏览器视图。此方案用于长期方向判断，不建议 V1.7a 一次全量实现。</text>

  <g transform="translate(56 154)">
    <rect width="1168" height="594" rx="10" fill="#FFFDF9" stroke="#BFB6AA"/>
    <rect width="120" height="594" rx="10" fill="#FFFDF9" stroke="#DED6C9"/>
    <text x="32" y="42" fill="#241F1A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="22" font-weight="900">ECRM</text>
    <g transform="translate(18 78)">
      <rect width="84" height="42" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
      <rect y="52" width="84" height="42" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
      <rect y="104" width="84" height="42" rx="8" fill="#DBE9E4" stroke="#76A093"/>
      <rect y="156" width="84" height="42" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
      <text x="30" y="26" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">商品</text>
      <text x="30" y="78" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">售卖</text>
      <text x="24" y="130" fill="#194A3F" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">仪表盘</text>
      <text x="30" y="182" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">设置</text>
    </g>

    <g transform="translate(120 0)">
      <rect width="1048" height="62" rx="0" fill="#FFFDF9" stroke="#DED6C9"/>
      <text x="24" y="30" fill="#241F1A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="22" font-weight="900">ECRM</text>
      <text x="24" y="48" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12">混合响应式</text>
      <rect x="864" y="16" width="132" height="30" rx="8" fill="#FFF2DC" stroke="#DDAE73"/>
      <text x="883" y="36" fill="#8A4512" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">现场模式已锁定</text>

      <g transform="translate(24 84)">
        <text x="0" y="31" fill="#241F1A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="28" font-weight="850">仪表盘</text>
        <text x="0" y="55" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13">桌面左侧导航，小屏底部导航。</text>
        <g transform="translate(630 10)">
          <rect width="78" height="34" rx="8" fill="#DBE9E4" stroke="#76A093"/>
          <rect x="88" width="94" height="34" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
          <rect x="192" width="70" height="34" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
          <text x="18" y="22" fill="#194A3F" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">近7天</text>
          <text x="106" y="22" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">正常销售</text>
          <text x="215" y="22" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">刷新</text>
        </g>
      </g>

      <g transform="translate(24 170)">
        <rect width="1000" height="104" rx="8" fill="#DBE9E4" stroke="#C9DCD5"/>
        <text x="22" y="38" fill="#194A3F" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="850">经营概览  ?</text>
        <text x="22" y="68" fill="#4C6C63" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13">桌面端内容最大化，小屏端切为底部导航。该方案开发和回归成本最高。</text>
      </g>

      <g transform="translate(24 292)">
        <rect width="318" height="118" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
        <rect x="342" width="318" height="118" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
        <rect x="684" width="316" height="118" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
        <rect y="138" width="318" height="118" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
        <rect x="342" y="138" width="318" height="118" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
        <rect x="684" y="138" width="316" height="118" rx="8" fill="#FFFFFF" stroke="#DED6C9"/>
        <text x="22" y="34" fill="#241F1A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="850">Desktop：左侧导航</text>
        <text x="364" y="34" fill="#241F1A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="850">iPad 横屏：可保留侧栏</text>
        <text x="706" y="34" fill="#241F1A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="850">iPad 竖屏：底部导航</text>
        <text x="22" y="172" fill="#241F1A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="850">移动端：底部导航</text>
        <text x="364" y="172" fill="#241F1A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="850">长期产品形态</text>
        <text x="706" y="172" fill="#241F1A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="850">需完整响应式测试</text>
      </g>
    </g>
  </g>

  <g transform="translate(56 770)">
    <rect width="96" height="28" rx="8" fill="#DBE9E4" stroke="#76A093"/>
    <rect x="106" width="106" height="28" rx="8" fill="#FFFDF9" stroke="#DED6C9"/>
    <rect x="222" width="106" height="28" rx="8" fill="#FFFDF9" stroke="#DED6C9"/>
    <rect x="338" width="92" height="28" rx="8" fill="#FFFDF9" stroke="#DED6C9"/>
    <text x="34" y="19" fill="#194A3F" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">桌面</text>
    <text x="124" y="19" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">iPad 横屏</text>
    <text x="240" y="19" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">iPad 竖屏</text>
    <text x="362" y="19" fill="#70685E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12" font-weight="800">移动端</text>
  </g>
</svg>
